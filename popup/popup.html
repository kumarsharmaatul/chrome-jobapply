<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <link rel='stylesheet' href='popup.css'>
</head>
<body>
  <h2>AI Job Auto Filler</h2>
  <select id='profileSelect'></select>
  <button id='autofillBtn'>Run Autofill</button>
  <button id='openOptionsBtn'>Open Profile Manager</button>
  <div id='result'></div>
  <ul id='preview'></ul>
  <div class='confirmation-box' id='confirmationBox' style='display:none;'>
    <p>Check all fields before clicking Apply on the site.</p>
    <button id='confirmBtn'>I have reviewed the fields</button>
  </div>
  <p class='hint'>Always review fields before manually submitting an application.</p>
  <script src='popup.js'></script>
</body>
</html>
